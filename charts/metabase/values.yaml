# Default values for metabase 

# Global configuration for all resources
global:
  # -- Service name used for resource naming
  service_name: metabase
  # -- Global labels applied to all resources
  labels: {}

# Metabase application configuration
metabase:
  # -- Metabase image configuration
  image:
    # -- Metabase image repository
    repository: metabase/metabase
    # -- Metabase image tag
    tag: latest
  # -- Port configuration
  ports:
    # -- HTTP port for Metabase container
    http: 3000
  
  # -- Health check configuration
  healthCheck:
    # -- Startup probe configuration. While the startup probe runs,
    # liveness and readiness probes are suspended. Use it to give slow-
    # starting JVM apps (Metabase Enterprise loads many drivers/plugins)
    # enough time to come up before the liveness probe kicks in.
    startup:
      # -- Enable the startup probe
      enabled: true
      # -- Initial delay before startup probe starts (seconds)
      initialDelaySeconds: 30
      # -- Period between startup probe checks (seconds)
      periodSeconds: 5
      # -- Timeout for startup probe (seconds)
      timeoutSeconds: 5
      # -- Number of successful checks needed to consider the container started
      successThreshold: 1
      # -- Number of failed checks before giving up. Total window =
      # initialDelaySeconds + (failureThreshold × periodSeconds).
      # Default: 30 + 60×5 = 330s.
      failureThreshold: 60
    # -- Readiness probe configuration
    readiness:
      # -- Initial delay before readiness probe starts (seconds)
      initialDelaySeconds: 120
      # -- Period between readiness probe checks (seconds)
      periodSeconds: 15
      # -- Timeout for readiness probe (seconds)
      timeoutSeconds: 5
      # -- Number of successful checks needed for readiness
      successThreshold: 1
      # -- Number of failed checks before marking as not ready
      failureThreshold: 10
    # -- Liveness probe configuration
    liveness:
      # -- Initial delay before liveness probe starts (seconds)
      initialDelaySeconds: 90
      # -- Period between liveness probe checks (seconds)
      periodSeconds: 15
      # -- Timeout for liveness probe (seconds)
      timeoutSeconds: 5
      # -- Number of successful checks needed for liveness
      successThreshold: 1
      # -- Number of failed checks before restarting container
      failureThreshold: 10
  # -- Resource requests and limits
  resources:
    # -- Resource requests
    requests:
      # -- CPU request
      cpu: 500m
      # -- Memory request
      memory: 1024Mi
    # -- Resource limits
    limits:
      # -- CPU limit
      cpu: 1000m
      # -- Memory limit
      memory: 2048Mi
  # -- Number of replicas
  replicas: 1
  # -- Extra JVM options injected as JAVA_TOOL_OPTIONS. The JVM reads
  # JAVA_TOOL_OPTIONS automatically in addition to JAVA_OPTS, so this
  # extends rather than overrides image-level JVM configuration (e.g.
  # log4j2 file location baked into a custom image). Typical use: heap
  # sizing (-Xmx) and connection pool tuning. Empty by default.
  javaToolOptions: ""
  # -- Pod tolerations
  tolerations: []
  # -- Node selector for pod placement
  nodeSelector: {}
  # -- IngressRoute configuration
  ingress:
    # -- IngressRoute URL/hostname
    url: metabase.example.com
    # -- Entry points for Traefik
    entryPoints:
      - internal
    # -- TLS configuration
    tls:
      enabled: false
      secretName: ""
  # -- ConfigMap variables configuration
  configMapVars:
    - name: MB_DB_TYPE
      value: h2
    - name: MB_DB_PORT
      value: "5432"
    - name: MB_REDIRECT_ALL_REQUESTS_TO_HTTPS
      value: "false"
  
  # -- Secrets variables configuration
  secretsVars:
    - name: metabase-db-credentials-secret
      vaultPath: metabase/db-credentials
      envVars:
        - name: MB_DB_DBNAME
          key: DB_NAME
        - name: MB_DB_USER
          key: DB_USER
        - name: MB_DB_PASS
          key: DB_PASS
    - name: metabase-db-host-secret
      vaultPath: metabase/db-host
      envVars:
        - name: MB_DB_HOST
          key: DB_HOST

# Service configuration
service:
  # -- Service type (ClusterIP, NodePort, LoadBalancer)
  type: ClusterIP
  # -- Service port (port exposed by the service)
  port: 3000
  # -- Target port (port on the container, defaults to metabase.ports.http)
  targetPort: null

# Service account configuration
serviceAccount:
  # -- Create a service account
  create: false
  # -- Service account name (required if create is true)
  name: ""
  # Example configuration:
  # create: true
  # name: metabase-sa
# Vault configuration
vault:
  # -- Vault connection configuration
  connection:
    # -- Create VaultConnection resource
    create: true
    # -- VaultConnection resource name
    name: default
    # -- Vault server address
    address: http://vault.vault.svc.cluster.local:8200
  # -- Vault authentication mount path
  authMount: kubernetes
  # -- Vault role name for Kubernetes authentication
  role: vault-metabase-role
  # -- Vault service account configuration
  serviceAccount:
    # -- Create Vault service account
    create: true
    # -- Vault service account name
    name: ""